<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Rakib</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg: #f3f4f6;
      --card-bg: #ffffff;
      --primary: #274f3f;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    
    .sidebar {
      width: 250px;
      background: var(--primary);
      color: white;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      padding: 20px;
    }
    .sidebar h2 { margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;}
    .nav-tabs { display: flex; flex-direction: column; gap: 10px; }
    .nav-tabs button {
      background: transparent;
      color: rgba(255,255,255,0.7);
      border: none;
      padding: 12px;
      text-align: left;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .nav-tabs button:hover, .nav-tabs button.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .main-content {
      margin-left: 250px;
      padding: 40px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .header h1 { margin: 0; font-size: 2rem; color: var(--text); }
    
    .panel {
      display: none;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 30px;
      margin-bottom: 30px;
    }
    .panel.active { display: block; }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }
    
    .spinner {
      text-align: center;
      padding: 40px;
      font-size: 2rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2><i class="fa-solid fa-code"></i> Admin Panel</h2>
    <div class="nav-tabs">
      <button class="active" onclick="switchTab('messages')"><i class="fa-solid fa-envelope"></i> Messages</button>
      <button onclick="switchTab('settings')"><i class="fa-solid fa-cog"></i> Settings</button>
    </div>
  </div>

  <div class="main-content">
    <div class="header">
      <h1>Dashboard</h1>
    </div>

    <!-- Messages Panel -->
    <div id="messages" class="panel active">
      <h2 style="margin-top:0">Contact Messages</h2>
      <p style="color:var(--muted)">View messages sent from your portfolio contact form.</p>
      
      <div id="messages-loading" class="spinner">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
      </div>
      
      <table id="messages-table" style="display:none">
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Email</th>
            <th>Subject</th>
            <th>Budget</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="messages-list">
        </tbody>
      </table>
    </div>

    <!-- Settings Panel -->
    <div id="settings" class="panel">
      <h2 style="margin-top:0">General Settings</h2>
      <p style="color:var(--muted)">Manage basic settings (Coming Soon).</p>
      <div style="padding: 40px; text-align: center; background: var(--bg); border-radius: 8px; border: 1px dashed var(--border);">
        <i class="fa-solid fa-hammer" style="font-size: 3rem; color: var(--muted); margin-bottom: 20px; display: block;"></i>
        Under Construction
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADN_dWNHXyNDkdN1RmNB9F5hV_sgqsFuM",
      authDomain: "rakib-18024.firebaseapp.com",
      databaseURL: "https://rakib-18024-default-rtdb.firebaseio.com",
      projectId: "rakib-18024",
      storageBucket: "rakib-18024.firebasestorage.app",
      messagingSenderId: "193964280836",
      appId: "1:193964280836:web:e429578d2490129c8f3951"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.switchTab = function(tabId) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.currentTarget.classList.add('active');
    };

    async function loadMessages() {
      try {
        const q = query(collection(db, "messages"), orderBy("timestamp", "desc"));
        const querySnapshot = await getDocs(q);
        const list = document.getElementById('messages-list');
        list.innerHTML = '';
        
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          const date = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : 'N/A';
          list.innerHTML += \`
            <tr>
              <td style="white-space:nowrap; font-size:0.9rem; color:var(--muted)">\${date}</td>
              <td style="font-weight:600">\${data.name}</td>
              <td><a href="mailto:\${data.email}">\${data.email}</a></td>
              <td>\${data.subject}</td>
              <td><span style="background:rgba(39, 79, 63, 0.1); color:#274f3f; padding:4px 8px; border-radius:4px; font-size:0.8rem; font-weight:bold;">\${data.budget}</span></td>
              <td style="max-width:300px; line-height:1.4">\${data.message}</td>
            </tr>
          \`;
        });

        document.getElementById('messages-loading').style.display = 'none';
        document.getElementById('messages-table').style.display = 'table';
      } catch (e) {
        console.error("Error loading messages: ", e);
        document.getElementById('messages-loading').innerHTML = '<div style="color:red"><i class="fa-solid fa-triangle-exclamation"></i> Error loading messages. Make sure you have setup Firestore Database rules to allow reading.</div>';
      }
    }

    // Load initially
    loadMessages();
  </script>
</body>
</html>
